<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading... — Inline TV</title>
  <link href="../images/nHNJSMT3WlUndT1kg7386H9TU.png" rel="icon" media="(prefers-color-scheme: light)">
  <link href="../images/4pHoiEYsUvFiyylIdXFWojcXw.png" rel="icon" media="(prefers-color-scheme: dark)">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    @font-face { font-family: "ABC Ginto Nord Unlicensed Trial Bold"; src: url("https://framerusercontent.com/assets/45iuft7aIieyPmQo3XZH1OrtyLo.woff2"); font-display: swap; font-weight: 700 }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
    body { background: #fef6f0; font-family: 'Inter', sans-serif; color: #1a1a1a; min-height: 100vh; padding-top: 44px; }

    .tmc-bar { position: fixed; top: 0; left: 0; right: 0; height: 44px; background: #000; z-index: 10000; display: flex; align-items: center; }
    .tmc-bar a { display: block; }
    .tmc-bar img { display: block; height: 44px; width: auto; }
    a { color: #20f; }

    /* Header */
    .header { background: #20f; height: 60px; display: flex; align-items: center; padding: 0 24px; position: sticky; top: 58px; z-index: 100; }
    .header-inner { max-width: 1200px; width: 100%; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .header-logo { font-family: 'ABC Ginto Nord Unlicensed Trial Bold', sans-serif; font-size: 20px; color: #fff; text-decoration: none; }
    .header-logo span { color: rgba(255,255,255,0.6); }
    .header-nav { display: flex; gap: 20px; }
    .header-nav a { color: rgba(255,255,255,0.7); font-size: 14px; font-weight: 500; text-decoration: none; transition: color 0.2s; }
    .header-nav a:hover { color: #fff; }

    /* Cover image */
    .page-cover { width: 100%; max-height: 400px; object-fit: cover; display: block; }

    /* Page content */
    .page-container { max-width: 800px; margin: 0 auto; padding: 48px 24px 80px; }
    .page-meta { margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid #e8e8e8; }
    .page-title {
      font-family: 'ABC Ginto Nord Unlicensed Trial Bold', sans-serif;
      font-size: 40px; font-weight: 700; line-height: 1.2; margin-bottom: 12px;
    }
    .page-description { font-size: 18px; color: #767676; line-height: 1.6; margin-bottom: 12px; }
    .page-date { font-size: 13px; color: #a3a3a3; }

    /* Block styles */
    .block { margin-bottom: 24px; animation: fadeIn 0.4s ease; }
    .block:last-child { margin-bottom: 0; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .block-heading-1 { font-family: 'ABC Ginto Nord Unlicensed Trial Bold', sans-serif; font-size: 32px; font-weight: 700; line-height: 1.25; margin-top: 40px; margin-bottom: 16px; }
    .block-heading-2 { font-family: 'ABC Ginto Nord Unlicensed Trial Bold', sans-serif; font-size: 24px; font-weight: 700; line-height: 1.3; margin-top: 32px; margin-bottom: 12px; }
    .block-heading-3 { font-size: 18px; font-weight: 700; line-height: 1.4; margin-top: 24px; margin-bottom: 8px; }

    .block-text { font-size: 16px; line-height: 1.8; color: #333; }
    .block-text strong { font-weight: 600; }
    .block-text em { font-style: italic; }
    .block-text a { color: #20f; text-decoration: underline; }

    .block-image { border-radius: 12px; overflow: hidden; }
    .block-image img { width: 100%; display: block; border-radius: 12px; }
    .block-image .caption { font-size: 13px; color: #a3a3a3; text-align: center; margin-top: 10px; }

    .block-code {
      background: #1a1a1a; color: #e0e0e0; padding: 20px 24px;
      border-radius: 12px; font-family: 'JetBrains Mono', monospace;
      font-size: 14px; line-height: 1.7; overflow-x: auto; position: relative;
    }
    .block-code .lang-label {
      position: absolute; top: 8px; right: 12px;
      font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px;
    }

    .block-callout {
      padding: 20px 24px; border-radius: 12px; border-left: 4px solid;
      font-size: 15px; line-height: 1.6;
    }
    .block-callout.info { background: #eef4ff; border-color: #20f; color: #1a3a6b; }
    .block-callout.warning { background: #fff8ee; border-color: #f5a623; color: #6b4a1a; }
    .block-callout.tip { background: #eefff4; border-color: #22c55e; color: #1a6b3a; }
    .block-callout.error { background: #fff0f0; border-color: #ef4444; color: #6b1a1a; }
    .block-callout-title { font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }

    .block-divider { border: none; border-top: 1px solid #e0e0e0; margin: 32px 0; }

    .block-quote {
      border-left: 3px solid #20f; padding: 12px 24px; margin: 24px 0;
      font-size: 18px; font-style: italic; color: #484848; line-height: 1.7;
      background: #f9f9ff; border-radius: 0 8px 8px 0;
    }

    .block-list { font-size: 16px; line-height: 1.8; color: #333; padding-left: 24px; }
    .block-list li { margin-bottom: 6px; }
    .block-list.checklist { list-style: none; padding-left: 0; }
    .block-list.checklist li { display: flex; align-items: flex-start; gap: 8px; }
    .block-list.checklist li::before { content: '☐'; font-size: 18px; flex-shrink: 0; }
    .block-list.checklist li.checked::before { content: '☑'; color: #22c55e; }

    .block-table { width: 100%; border-collapse: collapse; border-radius: 12px; overflow: hidden; font-size: 14px; }
    .block-table th { background: #f5f5f5; font-weight: 600; text-align: left; padding: 12px 16px; border-bottom: 2px solid #e0e0e0; }
    .block-table td { padding: 10px 16px; border-bottom: 1px solid #f0f0f0; }
    .block-table tr:last-child td { border-bottom: none; }

    .block-chart { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .block-chart .chart-title { font-weight: 600; font-size: 15px; margin-bottom: 16px; }
    .chart-bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .chart-bar-label { width: 100px; font-size: 13px; color: #484848; text-align: right; flex-shrink: 0; }
    .chart-bar-track { flex: 1; height: 28px; background: #f0f0f0; border-radius: 6px; overflow: hidden; }
    .chart-bar-fill { height: 100%; background: linear-gradient(90deg, #20f, #6644ff); border-radius: 6px; transition: width 1s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; }
    .chart-bar-value { font-size: 12px; font-weight: 600; color: #fff; }

    .block-embed iframe { width: 100%; border: none; border-radius: 12px; }

    /* Loading & 404 */
    .page-loading { text-align: center; padding: 120px 24px; }
    .page-loading .spinner { width: 36px; height: 36px; border: 3px solid #e8e8e8; border-top-color: #20f; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .page-loading p { color: #767676; font-size: 15px; }
    .page-404 { text-align: center; padding: 120px 24px; }
    .page-404 h1 { font-family: 'ABC Ginto Nord Unlicensed Trial Bold', sans-serif; font-size: 64px; color: #20f; margin-bottom: 12px; }
    .page-404 p { color: #767676; font-size: 16px; margin-bottom: 24px; }
    .page-404 a { display: inline-block; background: #20f; color: #fff; padding: 12px 24px; border-radius: 10px; text-decoration: none; font-weight: 600; transition: transform 0.2s; }
    .page-404 a:hover { transform: translateY(-2px); }

    /* Table of contents */
    .page-toc { background: #f9f9ff; border: 1px solid #e8e8ff; border-radius: 12px; padding: 20px 24px; margin-bottom: 32px; }
    .page-toc h4 { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: #20f; font-weight: 700; margin-bottom: 12px; }
    .page-toc ul { list-style: none; padding: 0; }
    .page-toc li { margin-bottom: 6px; }
    .page-toc a { color: #484848; font-size: 14px; text-decoration: none; transition: color 0.2s; }
    .page-toc a:hover { color: #20f; }
    .page-toc .toc-h3 { padding-left: 16px; }

    @media (max-width: 809px) {
      .page-title { font-size: 28px; }
      .page-container { padding: 32px 16px 60px; }
      .block-heading-1 { font-size: 26px; }
      .block-heading-2 { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="tmc-bar">
    <a href="https://tmc.gg" target="_blank" rel="noopener"><img src="/images/tmc-logo.png" alt="TMC" width="207" height="58"></a>
  </div>
  <header class="header">
    <div class="header-inner">
      <a href="/" class="header-logo">inline<span>tv</span></a>
      <nav class="header-nav">
        <a href="/">Home</a>
        <a href="/pods/">Podcasts</a>
        <div data-cirya-sso></div>
      </nav>
    </div>
  </header>

  <div id="page-cover-wrap"></div>
  <div id="page-content">
    <div class="page-loading">
      <div class="spinner"></div>
      <p>Loading page...</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://qiyxxjlekhnjthuepxzt.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpeXh4amxla2huanRodWVweHp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NTk2NDIsImV4cCI6MjA5NDAzNTY0Mn0.bRYA7hB5b3TZGlYJCJ06skDLEY6INGdFQztt89tIPWg';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // Get slug from ?page=slug
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('page');

    if (!slug) {
      show404();
    } else {
      loadPage(slug);
    }

    async function loadPage(slug) {
      try {
        const { data, error } = await sb
          .from('pages')
          .select('*')
          .eq('slug', slug)
          .eq('published', true)
          .single();

        if (error || !data) {
          show404();
          return;
        }

        document.title = data.title + ' — Inline TV';

        // Cover image
        if (data.cover_image) {
          document.getElementById('page-cover-wrap').innerHTML =
            '<img class="page-cover" src="' + data.cover_image + '" alt="' + esc(data.title) + '">';
        }

        // Build page
        let html = '<div class="page-container">';
        html += '<div class="page-meta">';
        html += '<h1 class="page-title">' + esc(data.title) + '</h1>';
        if (data.description) html += '<p class="page-description">' + esc(data.description) + '</p>';
        html += '<span class="page-date">Published ' + new Date(data.created_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) + '</span>';
        html += '</div>';

        const blocks = data.blocks || [];

        // Generate TOC from headings
        const headings = blocks.filter(b => b.type === 'heading');
        if (headings.length >= 3) {
          html += '<div class="page-toc"><h4>On this page</h4><ul>';
          headings.forEach((h, i) => {
            const id = 'heading-' + i;
            const cls = h.data.level === 3 ? ' class="toc-h3"' : '';
            html += '<li' + cls + '><a href="#' + id + '">' + esc(h.data.text) + '</a></li>';
          });
          html += '</ul></div>';
        }

        // Render blocks
        let headingIdx = 0;
        blocks.forEach(block => {
          html += renderBlock(block, headingIdx);
          if (block.type === 'heading') headingIdx++;
        });

        html += '</div>';
        document.getElementById('page-content').innerHTML = html;

        // Animate chart bars
        setTimeout(() => {
          document.querySelectorAll('.chart-bar-fill').forEach(bar => {
            bar.style.width = bar.dataset.width;
          });
        }, 200);

      } catch (e) {
        console.error(e);
        show404();
      }
    }

    function renderBlock(block, headingIdx) {
      const d = block.data || {};
      switch (block.type) {
        case 'heading': {
          const level = d.level || 2;
          const id = 'heading-' + headingIdx;
          return '<h' + level + ' class="block block-heading-' + level + '" id="' + id + '">' + esc(d.text || '') + '</h' + level + '>';
        }
        case 'text':
          return '<div class="block block-text">' + formatText(d.text || '') + '</div>';
        case 'image': {
          let h = '<div class="block block-image">';
          h += '<img src="' + esc(d.url || '') + '" alt="' + esc(d.alt || '') + '" loading="lazy">';
          if (d.caption) h += '<div class="caption">' + esc(d.caption) + '</div>';
          h += '</div>';
          return h;
        }
        case 'code': {
          let h = '<div class="block block-code">';
          if (d.language) h += '<span class="lang-label">' + esc(d.language) + '</span>';
          h += '<pre><code>' + esc(d.code || '') + '</code></pre></div>';
          return h;
        }
        case 'callout': {
          const style = d.style || 'info';
          const icons = { info: 'ℹ️', warning: '⚠️', tip: '💡', error: '❌' };
          let h = '<div class="block block-callout ' + style + '">';
          if (d.title) h += '<div class="block-callout-title">' + (icons[style] || '') + ' ' + esc(d.title) + '</div>';
          h += formatText(d.text || '') + '</div>';
          return h;
        }
        case 'divider':
          return '<hr class="block block-divider">';
        case 'quote':
          return '<blockquote class="block block-quote">' + formatText(d.text || '') + '</blockquote>';
        case 'list': {
          const tag = d.ordered ? 'ol' : 'ul';
          const items = d.items || [];
          const cls = d.checklist ? ' checklist' : '';
          let h = '<' + tag + ' class="block block-list' + cls + '">';
          items.forEach(item => {
            const checked = item.checked ? ' class="checked"' : '';
            h += '<li' + checked + '>' + formatText(item.text || item) + '</li>';
          });
          h += '</' + tag + '>';
          return h;
        }
        case 'table': {
          const rows = d.rows || [];
          if (!rows.length) return '';
          let h = '<table class="block block-table"><thead><tr>';
          (rows[0] || []).forEach(cell => { h += '<th>' + esc(cell) + '</th>'; });
          h += '</tr></thead><tbody>';
          rows.slice(1).forEach(row => {
            h += '<tr>';
            row.forEach(cell => { h += '<td>' + esc(cell) + '</td>'; });
            h += '</tr>';
          });
          h += '</tbody></table>';
          return h;
        }
        case 'chart': {
          const bars = d.bars || [];
          const maxVal = Math.max(...bars.map(b => b.value), 1);
          let h = '<div class="block block-chart">';
          if (d.title) h += '<div class="chart-title">' + esc(d.title) + '</div>';
          bars.forEach(bar => {
            const pct = (bar.value / maxVal * 100).toFixed(1) + '%';
            h += '<div class="chart-bar-row">';
            h += '<div class="chart-bar-label">' + esc(bar.label) + '</div>';
            h += '<div class="chart-bar-track"><div class="chart-bar-fill" style="width:0" data-width="' + pct + '">';
            h += '<span class="chart-bar-value">' + bar.value + '</span></div></div>';
            h += '</div>';
          });
          h += '</div>';
          return h;
        }
        case 'embed':
          return '<div class="block block-embed"><iframe src="' + esc(d.url || '') + '" height="' + (d.height || 400) + '" allowfullscreen></iframe></div>';
        default:
          return '';
      }
    }

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function formatText(text) {
      return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/`(.*?)`/g, '<code style="background:#f0f0f0;padding:2px 6px;border-radius:4px;font-size:14px;">$1</code>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
        .replace(/\n/g, '<br>');
    }

    function show404() {
      document.title = 'Page Not Found — Inline TV';
      document.getElementById('page-content').innerHTML = `
        <div class="page-404">
          <h1>404</h1>
          <p>This page doesn't exist or isn't published yet.</p>
          <a href="/">Back to Home</a>
        </div>`;
    }
  </script>

  <!-- CiryaSSO -->
  <script src="https://cirya.co/sso-sdk.js" async></script>
</body>
</html>
