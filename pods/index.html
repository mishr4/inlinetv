<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pods — Inline TV</title>
  <meta name="description" content="Listen to podcasts and live radio from Inline TV and the TMC Media network.">
  <link href="../images/nHNJSMT3WlUndT1kg7386H9TU.png" rel="icon" media="(prefers-color-scheme: light)">
  <link href="../images/4pHoiEYsUvFiyylIdXFWojcXw.png" rel="icon" media="(prefers-color-scheme: dark)">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;700&family=Geist:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face { font-family: "ABC Ginto Nord Unlicensed Trial Bold"; src: url("https://framerusercontent.com/assets/45iuft7aIieyPmQo3XZH1OrtyLo.woff2"); font-display: swap; font-weight: 700 }
    @font-face { font-family: "ABC Ginto GRK Normal Unlicensed Trial Regular"; src: url("https://framerusercontent.com/assets/3YnML6L46RAV7JS1DHmyJF9YKg.woff2"); font-display: swap; font-weight: 400 }
    @font-face { font-family: "ABC Ginto GRK Normal Unlicensed Trial Bold"; src: url("https://framerusercontent.com/assets/EbmAejJgYKfy3dba8SPSW5Jzxo.woff2"); font-display: swap; font-weight: 700 }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; }
    body { background: #fef6f0; font-family: 'Inter', sans-serif; color: #1a1a1a; overflow-x: hidden; }
    a { text-decoration: none; color: inherit; }

    /* ===== HEADER ===== */
    .header { background: #20f; height: 70px; display: flex; align-items: center; padding: 0 56px; position: sticky; top: 0; z-index: 100; }
    .header-inner { max-width: 1200px; width: 100%; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .logo { height: 29px; }
    .logo img { height: 100%; }
    .nav-links { display: flex; gap: 24px; align-items: center; }
    .nav-links a { color: rgba(255,255,255,0.7); font-family: 'ABC Ginto GRK Normal Unlicensed Trial Regular', 'Inter', sans-serif; font-size: 15px; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: #fff; }

    /* ===== PAGE CONTENT ===== */
    .page { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    /* ===== RADIO HERO ===== */
    .radio-hero { background: #20f; border-radius: 20px; margin-top: 32px; padding: 40px 48px; display: flex; align-items: center; gap: 40px; position: relative; overflow: hidden; }
    .radio-hero::before { content: ''; position: absolute; top: -60%; right: -10%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%); pointer-events: none; }
    .radio-art { width: 160px; height: 160px; border-radius: 16px; overflow: hidden; flex-shrink: 0; box-shadow: 0 8px 32px rgba(0,0,0,0.3); position: relative; z-index: 1; }
    .radio-art img { width: 100%; height: 100%; object-fit: cover; }
    .radio-info { flex: 1; position: relative; z-index: 1; }
    .radio-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.15); padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; color: #fff; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .radio-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: #ff4444; animation: pulse-dot 1.5s ease-in-out infinite; }
    .radio-badge.online .dot { background: #4ade80; }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .radio-title { font-family: 'ABC Ginto Nord Unlicensed Trial Bold', 'Geist', sans-serif; font-size: 36px; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .radio-now-playing { font-family: 'Albert Sans', sans-serif; font-size: 16px; color: rgba(255,255,255,0.65); margin-bottom: 20px; }
    .radio-controls { display: flex; align-items: center; gap: 16px; }
    .btn-play-radio { width: 52px; height: 52px; border-radius: 50%; background: #fff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
    .btn-play-radio:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(0,0,0,0.25); }
    .btn-play-radio svg { width: 22px; height: 22px; fill: #20f; margin-left: 2px; }
    .btn-play-radio.playing svg { margin-left: 0; }
    .radio-volume { display: flex; align-items: center; gap: 8px; }
    .radio-volume svg { width: 18px; height: 18px; fill: rgba(255,255,255,0.5); }
    .volume-slider { -webkit-appearance: none; appearance: none; width: 100px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; outline: none; }
    .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #fff; cursor: pointer; }
    .radio-listeners { font-size: 13px; color: rgba(255,255,255,0.45); margin-left: auto; }

    /* ===== PODCASTS SECTION ===== */
    .pods-section { margin-top: 40px; margin-bottom: 60px; }
    .pods-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 24px; }
    .pods-title { font-family: 'ABC Ginto Nord Unlicensed Trial Bold', 'Geist', sans-serif; font-size: 28px; font-weight: 700; }
    .pods-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .pod-card { background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.06); transition: transform 0.2s, box-shadow 0.2s; }
    .pod-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
    .pod-card-art { width: 100%; aspect-ratio: 1; background: #e8e8e8; overflow: hidden; }
    .pod-card-art img { width: 100%; height: 100%; object-fit: cover; }
    .pod-card-info { padding: 16px; }
    .pod-card-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .pod-card-desc { font-size: 13px; color: #767676; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .pod-episodes { margin-top: 8px; font-size: 12px; color: #a3a3a3; }

    /* Empty state */
    .pods-empty { text-align: center; padding: 60px 20px; background: #fff; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
    .pods-empty-icon { width: 64px; height: 64px; margin: 0 auto 16px; background: #f0edff; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .pods-empty-icon svg { width: 28px; height: 28px; fill: #20f; }
    .pods-empty h3 { font-family: 'Geist', sans-serif; font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .pods-empty p { font-size: 14px; color: #767676; max-width: 360px; margin: 0 auto; }

    /* ===== EPISODES LIST ===== */
    .episodes-section { margin-top: 40px; margin-bottom: 60px; }
    .episode-list { display: flex; flex-direction: column; gap: 12px; }
    .episode-item { background: #fff; border-radius: 12px; padding: 16px 20px; display: flex; align-items: center; gap: 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.04); transition: box-shadow 0.2s; cursor: pointer; }
    .episode-item:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .episode-play { width: 40px; height: 40px; border-radius: 50%; background: #f0edff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s; }
    .episode-play:hover { background: #20f; }
    .episode-play:hover svg { fill: #fff; }
    .episode-play svg { width: 16px; height: 16px; fill: #20f; margin-left: 2px; }
    .episode-info { flex: 1; min-width: 0; }
    .episode-title { font-size: 15px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .episode-meta { font-size: 12px; color: #a3a3a3; }
    .episode-duration { font-size: 12px; color: #a3a3a3; flex-shrink: 0; }

    /* ===== AUDIO PLAYER BAR ===== */
    .player-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(34,0,255,0.97); backdrop-filter: blur(20px); padding: 12px 24px; display: none; align-items: center; gap: 16px; z-index: 200; box-shadow: 0 -4px 24px rgba(0,0,0,0.2); }
    .player-bar.active { display: flex; }
    .player-bar-title { color: #fff; font-size: 14px; font-weight: 500; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-bar-btn { width: 36px; height: 36px; border-radius: 50%; background: #fff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .player-bar-btn svg { width: 14px; height: 14px; fill: #20f; }
    .player-bar-close { background: none; border: none; color: rgba(255,255,255,0.6); font-size: 20px; cursor: pointer; padding: 4px 8px; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 809px) {
      .header { padding: 0 20px; }
      .radio-hero { flex-direction: column; padding: 28px 24px; text-align: center; }
      .radio-art { width: 120px; height: 120px; }
      .radio-title { font-size: 26px; }
      .radio-controls { justify-content: center; flex-wrap: wrap; }
      .radio-listeners { margin-left: 0; width: 100%; text-align: center; }
      .pods-title { font-size: 22px; }
      .pods-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
      .nav-links { gap: 16px; }
      .nav-links a { font-size: 13px; }
    }
  </style>
</head>

  <script>
  (function() {
    const AZURACAST_BASE = 'https://cast.cirya.co';
    const STATION = 'inline';
    const STREAM_URL = 'https://cast.cirya.co/listen/inline/radio.mp3';

    let radioAudio = null;
    let radioPlaying = false;
    let podcastAudio = null;
    let podcastPlaying = false;

    // ===== RADIO =====
    async function fetchNowPlaying() {
      try {
        const res = await fetch(`${AZURACAST_BASE}/api/nowplaying/${STATION}`);
        const data = await res.json();
        const badge = document.getElementById('radio-status-badge');
        const statusText = document.getElementById('radio-status-text');
        const nowPlaying = document.getElementById('radio-now-playing');
        const listeners = document.getElementById('radio-listeners');
        const art = document.getElementById('radio-art-img');

        if (data.is_online) {
          badge.classList.add('online');
          statusText.textContent = data.live?.is_live ? 'Live' : 'On Air';
          const song = data.now_playing?.song;
          if (song && song.text && song.text !== 'Station Offline') {
            nowPlaying.textContent = song.text;
          } else {
            nowPlaying.textContent = 'Inline Radio';
          }
          if (song?.art) art.src = song.art;
          if (data.listeners?.current > 0) {
            listeners.textContent = data.listeners.current + ' listening';
          }
        } else {
          badge.classList.remove('online');
          statusText.textContent = 'Offline';
          nowPlaying.textContent = 'Station Offline';
          listeners.textContent = '';
        }
      } catch (e) {
        console.error('Failed to fetch now playing:', e);
      }
    }

    window.toggleRadio = function() {
      const btn = document.getElementById('btn-radio');
      if (radioPlaying) {
        radioAudio.pause();
        radioPlaying = false;
        btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
        btn.classList.remove('playing');
      } else {
        if (!radioAudio) {
          radioAudio = new Audio(STREAM_URL);
          radioAudio.volume = document.getElementById('volume-slider').value / 100;
        }
        radioAudio.play().catch(() => {});
        radioPlaying = true;
        btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
        btn.classList.add('playing');
      }
    };

    document.getElementById('volume-slider').addEventListener('input', function() {
      if (radioAudio) radioAudio.volume = this.value / 100;
    });

    // ===== PODCASTS =====
    async function fetchPodcasts() {
      try {
        const res = await fetch(`${AZURACAST_BASE}/api/station/${STATION}/public/podcasts`);
        const podcasts = await res.json();
        if (!podcasts || !podcasts.length) return;

        const grid = document.getElementById('pods-grid');
        grid.innerHTML = podcasts.map(pod => `
          <div class="pod-card" onclick="loadEpisodes('${pod.id}', '${pod.title.replace(/'/g, "\\'")}')">
            <div class="pod-card-art">
              ${pod.art ? `<img src="${pod.art}" alt="${pod.title}" loading="lazy">` : ''}
            </div>
            <div class="pod-card-info">
              <div class="pod-card-title">${pod.title}</div>
              <div class="pod-card-desc">${pod.description || ''}</div>
              <div class="pod-episodes">${pod.episodes_count || 0} episodes</div>
            </div>
          </div>
        `).join('');
      } catch (e) {
        console.error('Failed to fetch podcasts:', e);
      }
    }

    window.loadEpisodes = async function(podcastId, podcastTitle) {
      try {
        const res = await fetch(`${AZURACAST_BASE}/api/station/${STATION}/public/podcast/${podcastId}/episodes`);
        const episodes = await res.json();
        const section = document.getElementById('episodes-section');
        const list = document.getElementById('episodes-list');
        document.getElementById('episodes-title').textContent = podcastTitle;

        if (!episodes || !episodes.length) {
          list.innerHTML = '<div class="pods-empty"><h3>No episodes yet</h3><p>Check back soon for new content.</p></div>';
        } else {
          list.innerHTML = episodes.map(ep => `
            <div class="episode-item" onclick="playEpisode('${ep.links?.download || ''}', '${ep.title.replace(/'/g, "\\'")}')">
              <button class="episode-play">
                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              </button>
              <div class="episode-info">
                <div class="episode-title">${ep.title}</div>
                <div class="episode-meta">${ep.publish_at ? new Date(ep.publish_at * 1000).toLocaleDateString() : ''}</div>
              </div>
              <span class="episode-duration">${ep.duration || ''}</span>
            </div>
          `).join('');
        }

        section.style.display = 'block';
        section.scrollIntoView({ behavior: 'smooth' });
      } catch (e) {
        console.error('Failed to fetch episodes:', e);
      }
    };

    window.playEpisode = function(url, title) {
      if (!url) return;
      const bar = document.getElementById('player-bar');
      const barTitle = document.getElementById('player-bar-title');
      const barBtn = document.getElementById('player-bar-btn');

      if (podcastAudio) podcastAudio.pause();
      podcastAudio = new Audio(url);
      podcastAudio.play().catch(() => {});
      podcastPlaying = true;

      barTitle.textContent = title;
      barBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
      bar.classList.add('active');
    };

    window.togglePlayerBar = function() {
      if (!podcastAudio) return;
      const barBtn = document.getElementById('player-bar-btn');
      if (podcastPlaying) {
        podcastAudio.pause();
        podcastPlaying = false;
        barBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
      } else {
        podcastAudio.play();
        podcastPlaying = true;
        barBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
      }
    };

    window.closePlayerBar = function() {
      if (podcastAudio) { podcastAudio.pause(); podcastAudio = null; }
      podcastPlaying = false;
      document.getElementById('player-bar').classList.remove('active');
    };

    // ===== INIT =====
    fetchNowPlaying();
    fetchPodcasts();
    setInterval(fetchNowPlaying, 15000);
  })();
  </script>
